font-1 = ${global-opts.font-mono-small}

[bar/bluetooth]

monitor = ${env:MONITOR}
bottom = false
override-redirect = true

width = 2.8%
height = ${global-opts.pill-height}

offset-x = 91%
offset-y = ${global-opts.pill-y-offset}

foreground = ${colour.pill-fg}
background = ${colour.pill-bg}

