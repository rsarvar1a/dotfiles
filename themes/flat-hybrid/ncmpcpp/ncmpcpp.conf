mpd_music_dir = /mnt/c/Music

visualizer_data_source = "/tmp/mpd.fifo"
visualizer_output_name = "MPD Fifo"
visualizer_type = "spectrum"
visualizer_look = "=="

#Columns
song_columns_list_format = "(50)[168]{tr} (50)[183]{a}"
song_status_format = "{{{$(168)%a$9}} $8-$9 {$(140)%t$9}}"
song_library_format = "{%t}|{%f}"
song_list_format = "$(204)%t $R$(140)%a $(244)($(252)%l$(240))"

now_playing_prefix = "$8$b"
browser_playlist_prefix = "● "
song_window_title_format = "{%t}|{%f} - {%a}"


alternative_header_first_line_format = ""
# alternative_header_second_line_format = ""
alternative_header_second_line_format = "{{$(222)$b%a$/b$9}{ - $(216)%b$9}{ ($(252)%y$9)}}|{%D}"

playlist_disable_highlight_delay = 1

#Various

playlist_show_remaining_time = "no"
playlist_shorten_total_times = "yes"
playlist_separate_albums = "no"
playlist_display_mode = "classic"  #classic
browser_display_mode = "classic" #classic
search_engine_display_mode = "columns" #classic
playlist_editor_display_mode = "columns"
discard_colors_if_item_is_selected = "no"
incremental_seeking = "yes"
seek_time = "1"
autocenter_mode = "yes"
centered_cursor = "yes"

#progressbar_look = "▬▬▬"
progressbar_look = "━━━"

progressbar_color = "black"
progressbar_elapsed_color = "183"


user_interface = "classic"
header_visibility = "yes"
statusbar_visibility = "yes"
titles_visibility = "no"
header_text_scrolling = "yes"
cyclic_scrolling = "no"
lines_scrolled = "2"
follow_now_playing_lyrics = "yes"
show_hidden_files_in_local_browser = "no"
jump_to_now_playing_song_at_start = "yes"
clock_display_seconds = "no"
display_volume_level = "yes"
display_bitrate = "no"
display_remaining_time = "no"
regular_expressions = "extended"
ignore_leading_the = "no"
block_search_constraints_change_if_items_found = "yes"
mouse_support = "yes"
mouse_list_scroll_whole_page = "yes"
external_editor = "vim"
use_console_editor = "yes"
colors_enabled = "yes"
empty_tag_color = "white"
header_window_color = "white"
state_line_color = "242"
state_flags_color = "183"
main_window_color = "248"
#main_window_highlight_color = "white"
statusbar_color = "white"
#active_column_color = "blue"
volume_color = "168"

locked_screen_width_part = 65

execute_on_song_change=kunst --silent || true
