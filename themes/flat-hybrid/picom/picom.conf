
backend = "glx";

shadow = true;
shadow-radius = 10;
shadow-offset-x = 0;
shadow-offset-y = 0;
shadow-red = 0.34;
shadow-green = 0.3;
shadow-blue = 0.3;
shadow-opacity = 0.5;
shadow-exclude = [
    "name = 'Notification'",
    "name = 'xfce4-notifyd'",
    "class_g = 'Firefox' && argb",
    "class_g = 'Synapse'",
    "class_g ?= 'Notify-osd'",
    "class_g ?= 'Cairo-dock'",
    "class_g ?= 'Xfce4-notifyd'",
    "class_g ?= 'Xfce4-power-manager'",
    "_GTK_FRAME_EXTENTS@:c",
    #"_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
    "class_g ?= 'rofi'",
    #"name = 'polybar'",
    "class_g ?= 'polybar'",
    "name = 'tint2'",
];
shadow-ignore-shaped = false;

inactive-opacity = 0.95;
active-opacity = 0.95;
frame-opacity = 1;
inactive-opacity-override = true;
inactive-dim = 0.01;

blur = false;
blur-background = true;
blur-background-frame = true;
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];
blur-method = "dual_kawase";
blur-strength = 7;

fading = false;
fade-delta = 10;
fade-in-step = 0.1;
fade-out-step = 0.1;
no-fading-openclose = true;

refresh-rate = 60;
detect-transient = true;

wintypes:
{
    tooltip =
    {
        fade = true;
        shadow = true;
        opacity = 0.95;
        focus = true;
    };
    utility =
  {
    shadow = false;
  };
};
