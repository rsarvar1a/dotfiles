
experimental-backends=true;
backend = "glx";
corner-radius = 0; # Not using that fork, openbox-patched does it instead.
round-borders = 0;

glx-no-stencil = false;
glx-copy-from-front = true;
glx-use-copysubbuffermesa = true;

shadow = true;

shadow-radius = 12;
shadow-offset-x = -5;
shadow-offset-y = -5;

shadow-red = 0.2;
shadow-green = 0.2;
shadow-blue = 0.2;

shadow-opacity = 0.65;
shadow-exclude = [
    "name = 'Notification'",
    "name = 'xfce4-notifyd'",
    "class_g = 'Firefox' && argb",
    "class_g = 'Synapse'",
    "class_g ?= 'Notify-osd'",
    "class_g ?= 'Cairo-dock'",
    "class_g ?= 'Xfce4-notifyd'",
    "class_g ?= 'Xfce4-power-manager'",
    "_GTK_FRAME_EXTENTS@:c",
    #"_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
    "class_g ?= 'rofi'",
    "name = 'polybar'",
    "class_g ?= 'polybar'"
];
shadow-ignore-shaped = false;

inactive-opacity = 0.96;
active-opacity = 0.98;
frame-opacity = 1;

inactive-opacity-override = true;
inactive-dim = 0.05;

blur = true;
blur-method = "dual_kawase";
blur-strength = 7;
blur-size =2;

blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;

blur-background-exclude = [
    "window_type = 'dock'"
#    "window_type = 'desktop'"
];

fading = true;
fade-delta = 2;
fade-in-step = 0.01;
fade-out-step = 0.01;
no-fading-openclose = true;

mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-ewmh-active-win = true;
detect-rounded-corners = true;
detect-client-opacity = true;

refresh-rate = 60;
vsync = true;
dbe = false;

unredir-if-possible = false;
detect-transient = true;
detect-client-leader = true;

wintypes:
{
    tooltip =
    {
        fade = true;
        shadow = true;
        opacity = 0.95;
        focus = true;
    };
    utility =
  {
    shadow = false;
  };
};
