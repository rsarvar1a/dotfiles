
[global/wm]

margin-bottom = 0
margin-top = 0

[opts]
top-radius-top = 0
top-radius-bottom = 0

bot-radius-top = 0
bot-radius-bottom = 0

y-offset = 0.75%

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

include-file = ~/.config/polybar/darktransparent/colors.ini
include-file = ~/.config/polybar/darktransparent/modules.ini

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[bar/left]

monitor = eDP1
monitor-fallback =
monitor-strict = false
override-redirect = false

bottom = false
fixed-center = true

width = 98.5%
height = 50

offset-x = 0.75%
offset-y = ${opts.y-offset}

background = ${color.transparent}
foreground = ${color.foreground}

radius-top = ${opts.top-radius-top}
radius-bottom = ${opts.top-radius-bottom}

line-size = 2
line-color = #000000

border-size = 0
border-color = #ffffff

padding = 0
module-margin-left = 0
module-margin-right = 0

font-0 = "Blackout Midnight:size=20;3"
font-1 = "Blackout Midnight:size=16;3"
font-2 = "Blackout Midnight:size=16;3"
font-3 = "Hack Nerd Font:size=20;3"

modules-left = openbox
modules-center = mpd spotifytext
modules-right =  network pad battery pad volume pad date

tray-position = none
enable-ipc = true

[bar/cpu]

override-redirect = false

height = 30
width = 19.25%
offset-x = 78.75%
offset-y = 0.75%:+50

foreground = ${color.foreground}
background = ${color.transparent}

modules-right = cpu

font-0 = "Blackout Midnight:size=20;3"
font-1 = "Blackout Midnight:size=16;3"
font-2 = "Blackout Midnight:size=16;3"
font-3 = "Hack Nerd Font:size=20;3"


[bar/memory]

override-redirect = false

foreground = ${color.foreground}
background = ${color.transparent}

height = 20
width = 19.25%
offset-x = 78.75%
offset-y = 0.75%:+80

modules-right = memory

font-0 = "Blackout Midnight:size=20;3"
font-1 = "Blackout Midnight:size=16;3"
font-2 = "Blackout Midnight:size=16;3"
font-3 = "Hack Nerd Font:size=20;3"

[bar/temp]

override-redirect = false

foreground = ${color.foreground}
background = ${color.transparent}

height = 41
width = 1%
offset-x = 98.25%
offset-y = 0.75%:+57

modules-center = temperature

font-0 = "Blackout Midnight:size=20;3"
font-1 = "Blackout Midnight:size=16;3"
font-2 = "Blackout Midnight:size=16;3"
font-3 = "Hack Nerd Font:size=30;7"

[winsopts]

background = ${color.transparent}
foreground = #e0e0e0
font = "Blackout 2AM:size=20;3"

[bar/spacer2]
bottom=false
override-redirect = false
height = 110
width = 1%
offset-y = ${opts.y-offset}
modules-center = pad
background = ${color.transparent}

[bar/spacer]
bottom = true
override-redirect = false
height = 50
offset-y = ${opts.y-offset}
modules-left = pad
background = ${color.transparent}

[bar/polyunder]

monitor = eDP1
monitor-fallback =
monitor-strict = false
override-redirect = true

bottom = true
fixed-center = false

width = 98.5%
height = 43

offset-x = 0.75%
offset-y = ${opts.y-offset}

background = ${winsopts.background}
foreground = ${winsopts.foreground}

radius-top = 0
radius-bottom = 0

line-size = 8
line-color = #00000000

padding = 0
module-margin-left = 0
module-margin-right = 0

font-0 = ${winsopts.font}
font-1 = "Blackout Midnight:size=16;3"
font-2 = "Blackout Midnight:size=16;3"
font-3 = "Hack Nerd Font:size=20;3"

modules-left = polyunderlines
tray-position = none
enable-ipc = true

[bar/polywin]

monitor = eDP1
monitor-fallback =
monitor-strict = false
override-redirect = true

bottom = true
fixed-center = false

width = 98.5%
height = 24

offset-x = 0.75%
offset-y = 27

background = ${winsopts.background}
foreground = ${winsopts.foreground}

radius-top = ${opts.bot-radius-top}
radius-bottom = ${opts.bot-radius-bottom}

line-size = 0
line-color = #00000000

padding = 0
module-margin-left = 0
module-margin-right = 0

font-0 = ${winsopts.font}
font-1 = "Blackout Midnight:size=16;3"
font-2 = "Blackout Midnight:size=16;3"
font-3 = "Hack Nerd Font:size=20;3"

modules-left = polywins
tray-position = none
enable-ipc = true

[settings]

throttle-output = 5
throttle-output-for = 10
throttle-input-for = 30

screenchange-reload = false

compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

format-foreground = 
format-background = 
format-underline =
format-overline =
format-spacing =
format-padding =
format-margin =
format-offset =

pseudo-transparency = false

