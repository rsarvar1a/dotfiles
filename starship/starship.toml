format = """[](fg:235)[](bg:235)$username$hostname$directory$git_branch$time[i](fg:235 bg:235)[](fg:235) $character """

add_newline=false

[username]
disabled = false
show_always = false
format = "[$user]($style)"
style_user = "fg:203 bg:235"

[hostname]
disabled = false
ssh_only = true
format = "[  $hostname]($style)"
style = "fg:222 bg:235"

[character]
use_symbol_for_status = true
success_symbol = "[ ](fg:077)"
error_symbol = "[ ✗](fg:160)"
# ﬦﬦ

[directory]
format = "[  $path]($style)"
style = "fg:183 bg:235 italic"
truncation_length = 2
truncate_to_repo = true
truncation_symbol = "…/"
fish_style_pwd_dir_length = 0

[cmd_duration]
format = " took [$duration]($style)"
style = "039"
min_time = 10

[time]
disabled = false
format = "[  $time]($style)"
style = "fg:203 bg:235"

[git_branch]
style = "bold fg:140 bg:235"
format = "[  $branch]($style)"

[git_status]
style = "fg:248"

[battery]
format = "with [$symbol$percentage]($style)"
full_symbol = "🔋 "

[[battery.display]]
threshold = 25
style = "bold 160"

[[battery.display]]
threshold = 50
style = "221"

[[battery.display]]
threshold = 100
style = "77"
